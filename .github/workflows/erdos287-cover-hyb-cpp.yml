name: Erdős 287 hyb cover tests (C++)

on:
  workflow_dispatch:
    inputs:
      N:
        description: "Maximum denominator N"
        required: true
        default: "55"
      P:
        description: "Maximum prime modulus P"
        required: true
        default: "55"
      low:
        description: "Near-sum lower bound"
        required: true
        default: "0.99"
      high:
        description: "Near-sum upper bound"
        required: true
        default: "1.01"
      shell_timeout_minutes:
        description: "Shell timeout before artifact upload"
        required: true
        default: "75"
      progress_every:
        description: "Heartbeat interval in visited nodes"
        required: true
        default: "100000"

jobs:
  cover-hyb-cpp:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: read

    steps:
      - name: Check out repo
        uses: actions/checkout@v6

      - name: Show runner info
        run: |
          echo "GITHUB_SHA=$GITHUB_SHA"
          g++ --version

      - name: Compile C++ hyb scanner
        run: |
          mkdir -p build results logs
          g++ -O3 -std=c++20 src/erdos287_cover_hyb.cpp -o build/erdos287_cover_hyb \
            2>&1 | tee logs/erdos287_cover_hyb_build.log

      - name: Run C++ hyb computation
        continue-on-error: true
        run: |
          mkdir -p results logs
          stdbuf -oL -eL timeout "${{ github.event.inputs.shell_timeout_minutes }}m" ./build/erdos287_cover_hyb \
            --N "${{ github.event.inputs.N }}" \
            --P "${{ github.event.inputs.P }}" \
            --low "${{ github.event.inputs.low }}" \
            --high "${{ github.event.inputs.high }}" \
            --progress-every "${{ github.event.inputs.progress_every }}" \
            --progress-out "results/N${{ github.event.inputs.N }}_P${{ github.event.inputs.P }}_hyb_cpp_progress.json" \
            --out "results/N${{ github.event.inputs.N }}_P${{ github.event.inputs.P }}_hyb_cpp.json" \
            2>&1 | tee logs/erdos287_cover_hyb.log

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: erdos287-cover-hyb-cpp-N${{ github.event.inputs.N }}-P${{ github.event.inputs.P }}
          path: |
            results/**
            logs/**
          retention-days: 30
          if-no-files-found: warn
