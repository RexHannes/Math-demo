name: Erdős 287 hyb cover tests (C++)

on:
  workflow_dispatch:
    inputs:
      N:
        description: "Maximum denominator N"
        required: true
        default: "55"
      P:
        description: "Maximum prime modulus P"
        required: true
        default: "55"
      low:
        description: "Near-sum lower bound"
        required: true
        default: "0.99"
      high:
        description: "Near-sum upper bound"
        required: true
        default: "1.01"
      start_min:
        description: "Minimum starting denominator for this chunk"
        required: true
        default: "2"
      start_max:
        description: "Maximum starting denominator for this chunk (0 means N)"
        required: true
        default: "0"
      shell_timeout_minutes:
        description: "Shell timeout before artifact upload"
        required: true
        default: "75"
      progress_every:
        description: "Heartbeat interval in visited nodes"
        required: true
        default: "10000000"

jobs:
  cover-hyb-cpp:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: read

    steps:
      - name: Check out repo
        uses: actions/checkout@v6

      - name: Show runner info
        run: |
          echo "GITHUB_SHA=$GITHUB_SHA"
          g++ --version

      - name: Compile C++ hyb scanner
        run: |
          set -o pipefail
          mkdir -p build results logs
          g++ -O3 -std=c++20 scripts/erdos287_cover.cpp -o build/erdos287_cover_hyb \
            2>&1 | tee logs/erdos287_cover_hyb_build.log

      - name: Run C++ hyb computation
        continue-on-error: true
        run: |
          set -o pipefail
          mkdir -p results logs
          chunk_suffix="S${{ github.event.inputs.start_min }}_${{ github.event.inputs.start_max }}"
          out_path="results/N${{ github.event.inputs.N }}_P${{ github.event.inputs.P }}_${chunk_suffix}_hyb_cpp.json"
          progress_path="results/N${{ github.event.inputs.N }}_P${{ github.event.inputs.P }}_${chunk_suffix}_hyb_cpp_progress.json"
          cat > "$out_path" <<EOF
          {
            "generated_at": "$(date +%s)",
            "completed": false,
            "interrupted": false,
            "runs": []
          }
          EOF
          cat > "$progress_path" <<EOF
          {
            "completed": false,
            "N": ${{ github.event.inputs.N }},
            "P": ${{ github.event.inputs.P }},
            "start_min": ${{ github.event.inputs.start_min }},
            "start_max": ${{ github.event.inputs.start_max }},
            "nodes": 0,
            "near_count": 0
          }
          EOF
          stdbuf -oL -eL timeout --signal=TERM --kill-after=120s "${{ github.event.inputs.shell_timeout_minutes }}m" ./build/erdos287_cover_hyb \
            --N "${{ github.event.inputs.N }}" \
            --P "${{ github.event.inputs.P }}" \
            --low "${{ github.event.inputs.low }}" \
            --high "${{ github.event.inputs.high }}" \
            --start-min "${{ github.event.inputs.start_min }}" \
            --start-max "${{ github.event.inputs.start_max }}" \
            --progress-every "${{ github.event.inputs.progress_every }}" \
            --progress-out "$progress_path" \
            --out "$out_path" \
            2>&1 | tee logs/erdos287_cover_hyb.log

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: erdos287-cover-hyb-cpp-N${{ github.event.inputs.N }}-P${{ github.event.inputs.P }}-S${{ github.event.inputs.start_min }}-${{ github.event.inputs.start_max }}
          path: |
            results/**
            logs/**
          retention-days: 30
          if-no-files-found: warn
